name: Bump Version Files

# When you push a tag vX.Y.Z this workflow:
#   1. Updates version in custom_components/meteobridge/manifest.json
#   2. Commits the changes directly to master
#   3. Moves the tag to point at the new commit
#   4. Creates a GitHub Release with changelog

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bump-versions:
    name: Bump version files to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump custom_components/meteobridge/manifest.json
        run: |
          python3 - <<'EOF'
          import json

          path = "custom_components/meteobridge/manifest.json"
          version = "${{ steps.ver.outputs.version }}"

          with open(path) as f:
              manifest = json.load(f)

          old = manifest.get("version", "?")
          manifest["version"] = version

          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          print(f"manifest.json: {old} → {version}")
          EOF

      - name: Commit bumped files and push to master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom_components/meteobridge/manifest.json

          if git diff --cached --quiet; then
            echo "No version change – skipping commit."
          else
            git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi

      - name: Move tag to new commit
        run: |
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force


  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: bump-versions
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Extract version (strip leading 'v')
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## What's changed
            ${{ steps.changelog.outputs.log }}

            ## Installation
            Install or update via [HACS](https://hacs.xyz), oppure copia manualmente
            la cartella `custom_components/meteobridge` nella tua installazione Home Assistant.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
